<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLERIC | So‘z o‘rganish</title>
    <meta name="theme-color" content="#0a0a1a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0c0c1a, #020208);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            color: #f0f3fa;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Glass panel */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.8rem;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .mode-switch {
            display: flex;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 0.2rem;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: #aaa;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #fbbf24;
            color: #0a0a1a;
        }
        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.96); }

        /* main scroll area */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.8rem;
            scroll-behavior: smooth;
        }
        .main-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .main-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        .main-scroll::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 10px;
        }

        /* Timer mode */
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
        }
        .word-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 2rem 3rem;
            margin: 1rem 0;
            width: 100%;
            max-width: 800px;
        }
        .timer-word {
            font-size: clamp(2.2rem, 12vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            word-break: break-word;
            background: linear-gradient(135deg, #fff, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .timer-meta {
            margin-top: 0.8rem;
            color: #aaa;
            font-size: 1rem;
        }
        .timer-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0 1rem;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .ctrl-btn:focus, .ctrl-btn:hover {
            background: #fbbf24;
            color: #0a0a1a;
            border-color: #fbbf24;
        }
        .speed-group {
            display: flex;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 1rem;
            border-radius: 60px;
        }
        .speed-opt {
            background: transparent;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
        }
        .speed-opt.active {
            background: #fbbf24;
            color: #0a0a1a;
        }
        .timer-progress {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #fbbf24;
        }

        /* Letter mode */
        .letters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .letter-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .letter-pill.active {
            background: #fbbf24;
            color: #0a0a1a;
        }
        .steps-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.8rem;
        }
        .step-pill {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.3rem 0.9rem;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .step-pill.active {
            background: #fbbf24;
            color: #0a0a1a;
        }
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem;
        }
        .word-tile {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .word-tile:focus, .word-tile:hover {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            transform: scale(1.02);
        }

        /* focus outline */
        button:focus, .word-tile:focus, .letter-pill:focus, .step-pill:focus, .ctrl-btn:focus, .speed-opt:focus {
            outline: 2px solid #fbbf24;
            outline-offset: 2px;
        }

        /* status bar */
        .status-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1.2rem;
            padding: 0.3rem 1.8rem;
            background: rgba(0,0,0,0.3);
            font-size: 0.7rem;
            color: #aaa;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .main-scroll { padding: 1rem; }
            .word-card { padding: 1.5rem; }
            .words-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        "X":{ step1:["Xa-to", "Xo-la", "Xa-fa", "Xo-s", "Xi-l", "Xo-r"], step2:["Xat-lar", "Xu-mi", "Xa-rit", "Xal-qim", "Xo-na", "Xur-mo"], step3:["Xa-rid", "Xa-bar", "Xir-mon", "Xa-ri-dor", "Xur-mo-zor", "Xal-qa-ro"], step4:["Xo-na-don", "Xa-bar-dor", "Xir-mon-jo", "Xiz-mat-chi", "Xi-yo-nat", "Xo-ti-ra"], step5:["Xa-ri-dor-lar", "Xo-na-don-lik", "Xa-bar-siz-lik", "Xiz-mat-chi-lik", "Xo-ti-ra-li", "Xavf-siz-lik"], step6:["Xal-qa-ro-la-shuv", "Xa-bar-dor-lik-dan", "Xi-yo-nat-kor-lik", "Xo-ti-ra-siz-lik", "Xavf-siz-lik-la-ri", "Xay-ri-xoh-lik-dan"] },

        "O'":{ step1:["O'-zi", "O'-y", "O'-q", "O'-t", "O'-n", "O'-ch"], step2:["O'-rik", "O'-rtoq", "O'-rdak", "O'-tish", "O'-yin", "O'-g'il"], step3:["O'-choq", "O'-rni", "O'-lim", "O'-zak", "O'-sim", "O'-rik-zor"], step4:["O'-g'il-cha", "O'-zak-li", "O'-yin-chi", "O'-rga-tish", "O'-tkir", "O'-qi-tuv"], step5:["O'-lim-la-ri", "O'-choq-chi", "O'-rtog'-im", "O'-qi-tuv-chi", "O'-quv-chi-lar", "O'-zga-rish"], step6:["O'-qi-tuv-chi-lik", "O'-zlash-ti-rish", "O'-yin-qad-roq", "O'-xshash-siz-lik", "O'-sim-lik-lar-ni", "O'-zga-ruv-chan"] },
        "G'":{ step1:["G'-or", "G'-am", "G'-oz", "G'-isht", "G'-il", "G'-ash"], step2:["G'o'-za", "G'i-lof", "G'o-lib", "G'o-ya", "G'i-rom", "G'a-zab"], step3:["G'al-la", "G'o-yib", "G'u-rur", "G'am-xo'r", "G'il-dir", "G'oy-o-na"], step4:["G'o-zal-lik", "G'al-la-kor", "G'u-rur-li", "G'il-di-rak", "G'a-zab-li", "G'o-yo-na"], step5:["G'am-xo'r-lik", "G'al-la-don", "G'il-ja-yish", "G'a-nim-lik", "G'u-bor-siz", "G'a-la-yon"], step6:["G'am-xo'r-lik-lar", "G'al-la-kor-lik", "G'a-zab-la-nish", "G'ir-rom-lik-lar", "G'o-ya-viy-lik", "G'ay-rat-li-lik"] },
        "Sh":{ step1:["Shu", "Sha-r", "Sho-h", "She-r", "Shi-r", "Sha-n"], step2:["Sha-har", "Shu-mi", "Sha-mo", "Shi-pa", "Sha-mol", "Shod-lik"], step3:["Shod-li", "Shi-rin", "Shu-kuh", "Sha-raf", "Shu-ur", "Shu-kr"], step4:["Sha-raf-li", "Sha-har-lar", "Shu-kuh-li", "Sha-mol-lar", "Shod-lik-lar", "Shu-kr-li"], step5:["Sha-har-li-lar", "Shi-fo-kor-lar", "Sho-shi-linch", "Sha-faq-li", "Sha-rob-xo-na", "Shi-ko-yat"], step6:["Shi-fo-kor-lik-da", "Sho-shi-linch-lik", "Shaf-qat-siz-lik", "Sha-raf-la-nish", "Shi-ko-yat-no-ma", "Sha-kar-ob-li-lik"] },
        "Ch":{ step1:["Cho'-l", "Cho-y", "Cho-p", "Cha-q", "Che-k", "Chi-z"], step2:["Cha-qa", "Chu-qur", "Che-lak", "Chi-roq", "Chay-la", "Cho-pon"], step3:["Choy-nak", "Chuch-va", "Cha-na", "Cha-qir", "Cho'-ntak", "Cho'-loq"], step4:["Chay-la-chi", "Chu-qur-lik", "Cha-qir-moq", "Choy-nak-lar", "Chi-roq-chi", "Cha-man-zor"], step5:["Cho-pon-la-ri", "Cha-qi-ruv-chi", "Che-ga-ra-siz", "Chaq-qon-lik", "Chi-dam-li-lik", "Chor-va-dor-lar"], step6:["Che-ga-ra-chi-lik", "Chor-va-dor-lik-da", "Cha-qi-ril-ma-gan", "Chi-dam-siz-lik-lar", "Chul-g'ab-o-lish-di", "Chaq-moq-tosh-lar"] },
        "Ng":{ step1:["To-ng", "So-ng", "Bo-ng", "Mi-ng", "Te-ng", "Ke-ng"], step2:["Ta-nga", "Ma-ngu", "Ya-ngi", "To-ngi", "Mi-ngi", "De-ngiz"], step3:["Sha-ng'i", "Si-ngil", "Jang-chi", "Ba-ngi", "Che-ngal", "Be-ngal"], step4:["Ta-nga-lar", "Man-gu-lik", "Tong-gi-lar", "Sin-gil-lar", "Keng-lik-lar", "Jang-goh"], step5:["De-ngiz-chi", "Jang-chi-lar", "Chan-gal-zor", "Ken-gu-ru", "Qo'-ng'i-roq", "Dong-dor-lik"], step6:["De-ngiz-chi-lik-da", "Chan-gal-zor-lik", "Ken-gay-ti-rish", "Qo'-ng'i-roq-lar", "To'-ng'-ich-lar", "Yen-gil-mas-lik"] }
    };

    const LETTERS = Object.keys(DB);
    let allWords = [];
    for (let step = 1; step <= 6; step++) {
        LETTERS.forEach(letter => {
            (DB[letter][`step${step}`] || []).forEach(word => {
                allWords.push({ word, letter, step });
            });
        });
    }

    // Favorites (localStorage)
    let favorites = new Set();
    function loadFavs() {
        try { let f = localStorage.getItem("xoleric_favs"); if (f) favorites = new Set(JSON.parse(f)); } catch(e) {}
        document.getElementById("favCount").innerText = favorites.size;
    }
    function saveFavs() {
        localStorage.setItem("xoleric_favs", JSON.stringify([...favorites]));
        document.getElementById("favCount").innerText = favorites.size;
    }
    function toggleFav(word) {
        if (favorites.has(word)) favorites.delete(word);
        else favorites.add(word);
        saveFavs();
    }

    // Speech
    let speechEnabled = true;
    function speakWord(text) {
        if (!speechEnabled) return;
        const clean = text.replace(/-/g, '');
        const utterance = new SpeechSynthesisUtterance(clean);
        utterance.lang = 'uz-UZ';
        utterance.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    // State
    let currentMode = "timer";   // 'timer' or 'letter'
    let timerIndex = 0;
    let timerPlaying = true;
    let timerSpeed = 30;
    let timerTimeLeft = 30;
    let timerInterval = null;

    let selectedLetter = "A";
    let selectedStep = 1;

    // DOM elements
    const mainScroll = document.getElementById("mainScroll");
    const modeTimerBtn = document.getElementById("modeTimerBtn");
    const modeLetterBtn = document.getElementById("modeLetterBtn");
    const voiceToggleBtn = document.getElementById("voiceToggleBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    // Render functions
    function renderTimerMode() {
        const wordObj = allWords[timerIndex];
        const html = `
            <div class="timer-container">
                <div class="word-card">
                    <div class="timer-word">${wordObj.word}</div>
                    <div class="timer-meta">${wordObj.step}-bosqich · ${wordObj.letter} harfi</div>
                </div>
                <div class="timer-controls">
                    <button class="ctrl-btn" id="timerPrev">◀ Oldingi</button>
                    <button class="ctrl-btn" id="timerPlayPause">${timerPlaying ? "⏸️ Pauza" : "▶️ Boshlash"}</button>
                    <button class="ctrl-btn" id="timerNext">Keyingi ▶</button>
                </div>
                <div class="speed-group" id="speedGroup">
                    <span>⏱️ Tezlik:</span>
                    <button data-speed="10" class="speed-opt ${timerSpeed === 10 ? 'active' : ''}">10s</button>
                    <button data-speed="20" class="speed-opt ${timerSpeed === 20 ? 'active' : ''}">20s</button>
                    <button data-speed="30" class="speed-opt ${timerSpeed === 30 ? 'active' : ''}">30s</button>
                    <button data-speed="45" class="speed-opt ${timerSpeed === 45 ? 'active' : ''}">45s</button>
                </div>
                <div class="timer-progress" id="timerProgress">⏲️ ${timerTimeLeft} soniya</div>
                <div class="timer-progress" style="margin-top:0.5rem; font-size:0.8rem;">⭐ Sevimli: <button id="favTimerBtn" style="background:none; border:none; color:#fbbf24; font-size:1rem;">${favorites.has(wordObj.word) ? '★' : '☆'}</button></div>
            </div>
        `;
        mainScroll.innerHTML = html;

        document.getElementById("timerPrev").onclick = () => {
            timerIndex = (timerIndex - 1 + allWords.length) % allWords.length;
            timerTimeLeft = timerSpeed;
            renderTimerMode();
        };
        document.getElementById("timerNext").onclick = () => {
            timerIndex = (timerIndex + 1) % allWords.length;
            timerTimeLeft = timerSpeed;
            renderTimerMode();
        };
        document.getElementById("timerPlayPause").onclick = () => {
            timerPlaying = !timerPlaying;
            renderTimerMode();
        };
        document.getElementById("favTimerBtn").onclick = () => {
            toggleFav(allWords[timerIndex].word);
            renderTimerMode();
        };
        document.querySelectorAll(".speed-opt").forEach(btn => {
            btn.onclick = () => {
                timerSpeed = parseInt(btn.dataset.speed);
                timerTimeLeft = timerSpeed;
                renderTimerMode();
            };
        });
        startTimerCountdown();
    }

    function startTimerCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        if (!timerPlaying) return;
        timerInterval = setInterval(() => {
            if (currentMode === "timer" && timerPlaying) {
                timerTimeLeft--;
                const prog = document.getElementById("timerProgress");
                if (prog) prog.innerText = `⏲️ ${timerTimeLeft} soniya`;
                if (timerTimeLeft <= 0) {
                    timerIndex = (timerIndex + 1) % allWords.length;
                    timerTimeLeft = timerSpeed;
                    renderTimerMode();
                }
            }
        }, 1000);
    }

    function renderLetterMode() {
        const words = DB[selectedLetter][`step${selectedStep}`] || [];
        const lettersHtml = `
            <div class="letters-bar">
                ${LETTERS.map(letter => `
                    <button class="letter-pill ${letter === selectedLetter ? 'active' : ''}" data-letter="${letter}">${letter}</button>
                `).join('')}
            </div>
            <div class="steps-bar">
                ${[1,2,3,4,5,6].map(step => `
                    <button class="step-pill ${step === selectedStep ? 'active' : ''}" data-step="${step}">${step}-bosqich</button>
                `).join('')}
            </div>
            <div class="words-grid">
                ${words.map(word => `
                    <div class="word-tile" tabindex="0" data-word="${word}">
                        ${word}
                        <div style="font-size:0.7rem; margin-top:0.3rem;">
                            <button class="fav-word-btn" data-word="${word}" style="background:none; border:none; color:#fbbf24; cursor:pointer;">${favorites.has(word) ? '★' : '☆'}</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        mainScroll.innerHTML = lettersHtml;

        // attach events
        document.querySelectorAll(".letter-pill").forEach(btn => {
            btn.onclick = () => {
                selectedLetter = btn.dataset.letter;
                renderLetterMode();
            };
        });
        document.querySelectorAll(".step-pill").forEach(btn => {
            btn.onclick = () => {
                selectedStep = parseInt(btn.dataset.step);
                renderLetterMode();
            };
        });
        document.querySelectorAll(".word-tile").forEach(tile => {
            tile.addEventListener("click", (e) => {
                if (e.target.classList.contains("fav-word-btn")) return;
                speakWord(tile.dataset.word);
            });
            const favBtn = tile.querySelector(".fav-word-btn");
            if (favBtn) {
                favBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleFav(favBtn.dataset.word);
                    renderLetterMode();
                };
            }
        });
    }

    // Mode switching
    function setMode(mode) {
        currentMode = mode;
        if (mode === "timer") {
            modeTimerBtn.classList.add("active");
            modeLetterBtn.classList.remove("active");
            if (timerInterval) clearInterval(timerInterval);
            renderTimerMode();
        } else {
            modeLetterBtn.classList.add("active");
            modeTimerBtn.classList.remove("active");
            if (timerInterval) clearInterval(timerInterval);
            renderLetterMode();
        }
    }

    // Voice & fullscreen
    voiceToggleBtn.onclick = () => {
        speechEnabled = !speechEnabled;
        voiceToggleBtn.innerHTML = speechEnabled ? "🎙️ OVOZ: FAOL" : "🔇 OVOZ: O'CHIQ";
    };
    fullscreenBtn.onclick = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };
    modeTimerBtn.onclick = () => setMode("timer");
    modeLetterBtn.onclick = () => setMode("letter");

    // Keyboard navigation: up/down scroll the container, left/right for navigation within the current view (buttons)
    window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") {
            mainScroll.scrollBy({ top: -80, behavior: "smooth" });
            e.preventDefault();
        } else if (e.key === "ArrowDown") {
            mainScroll.scrollBy({ top: 80, behavior: "smooth" });
            e.preventDefault();
        } else if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
            // we rely on natural focus movement; but we can also trigger prev/next in timer mode
            if (currentMode === "timer") {
                if (e.key === "ArrowLeft") {
                    document.getElementById("timerPrev")?.click();
                } else if (e.key === "ArrowRight") {
                    document.getElementById("timerNext")?.click();
                }
                e.preventDefault();
            }
            // In letter mode, left/right could be used to navigate between letters/steps, but not mandatory.
        } else if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            if (document.activeElement && document.activeElement.click) document.activeElement.click();
        }
    });

    // Initialize
    loadFavs();
    setMode("timer");
</script>
