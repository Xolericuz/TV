<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLƎRIƆ TV</title>
    <meta name="theme-color" content="#0a0a0f">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-light: #1e1e2a;
            --border: #2a2a35;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text: #f1f3f8;
            --text-dim: #9ca3af;
            --gold: #fbbf24;
            --danger: #f87171;
            --success: #4ade80;
            --radius: 24px;
            --radius-sm: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* FOCUS STYLES FOR REMOTE */
        :focus-visible {
            outline: 4px solid var(--gold);
            outline-offset: 4px;
            background-color: rgba(99, 102, 241, 0.3);
            transition: outline 0.05s;
        }

        button, .word-tile, .step-tab, .letter-tab, .ctrl-btn, .fav-mode-btn, .mode-btn, .speed-option {
            cursor: pointer;
            transition: all 0.1s linear;
        }

        button:active, .word-tile:active {
            transform: scale(0.97);
        }

        /* Scroll areas */
        .scroll-area {
            overflow-y: auto;
            flex: 1;
            padding: 20px 24px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--surface);
            height: 100%;
        }
        .scroll-area::-webkit-scrollbar {
            width: 8px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: var(--surface);
            border-radius: 10px;
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* Header */
        .tv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .mode-btn, .fullscreen-btn, .fav-mode-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .word-of-day {
            background: rgba(99,102,241,0.2);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border-left: 3px solid var(--gold);
        }

        /* Tabs */
        .tabs-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .step-tab, .letter-tab {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .step-tab.active, .letter-tab.active {
            background: var(--accent);
        }

        /* Words grid */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .word-tile {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .word-text {
            flex: 1;
            word-break: break-word;
        }
        .fav-star {
            font-size: 1.5rem;
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
        }
        .fav-star.inactive {
            color: var(--text-dim);
            opacity: 0.6;
        }

        /* Auto mode */
        .auto-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
        }
        .word-card {
            background: var(--surface-light);
            border: 3px solid var(--accent);
            border-radius: 48px;
            padding: 40px 50px;
            max-width: 90%;
            box-shadow: 0 0 35px rgba(99,102,241,0.3);
        }
        .big-word {
            font-size: 4rem;
            font-weight: 800;
            word-break: break-word;
        }
        .word-meta {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 16px;
        }
        .auto-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 20px;
        }
        .ctrl-btn {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
        }
        .speed-selector {
            display: flex;
            gap: 12px;
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 60px;
        }
        .speed-option {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 18px;
        }
        .speed-option.active {
            background: var(--accent);
        }
        .progress-text {
            margin-top: 15px;
            font-size: 1rem;
            color: var(--gold);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 700px) {
            .big-word { font-size: 2.5rem; }
            .word-tile { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div id="appRoot">
    <header class="tv-header">
        <div class="logo">📺 XOLERIC TV ·</div>
        <div class="header-buttons">
            <button class="mode-btn" id="listModeBtn">📋 RO‘YXAT</button>
            <button class="mode-btn" id="autoModeBtn">🎞️ AVTOMATIK</button>
            <button class="fullscreen-btn" id="fullscreenBtn">🖥️ TO‘LIQ EKRAN</button>
            <button class="fav-mode-btn" id="showFavBtn">⭐ SEVIMLILAR</button>
        </div>
        <div class="word-of-day" id="wordOfDay">✨ KUN SO‘ZI: </div>
    </header>

    <div id="listPanel" class="scroll-area">
        <div class="tabs-row" id="stepTabsContainer"></div>
        <div class="tabs-row" id="letterTabsContainer"></div>
        <div id="wordsGridContainer" class="words-grid"></div>
    </div>

    <div id="autoPanel" class="scroll-area hidden">
        <div class="auto-container">
            <div class="word-card">
                <div class="big-word" id="autoBigWord">-</div>
                <div class="word-meta" id="autoMetaInfo">-</div>
            </div>
            <div class="auto-controls">
                <button class="ctrl-btn" id="prevAutoBtn">◀ Oldingi</button>
                <button class="ctrl-btn" id="playPauseAutoBtn">⏸️ Pauza</button>
                <button class="ctrl-btn" id="nextAutoBtn">Keyingi ▶</button>
                <button class="ctrl-btn" id="speakAutoBtn">🔊 Takror</button>
                <button class="ctrl-btn" id="favAutoBtn">⭐ Sevimli</button>
            </div>
            <div class="speed-selector" id="speedGroup">
                <span>⏱️ Tezlik:</span>
                <button data-speed="10" class="speed-option">10s</button>
                <button data-speed="20" class="speed-option">20s</button>
                <button data-speed="30" class="speed-option active">30s</button>
                <button data-speed="45" class="speed-option">45s</button>
            </div>
            <div class="progress-text" id="autoProgress">📍 1 / 10000</div>
            <div class="progress-text" id="timerDisplayAuto">⏲️ 30 soniya</div>
        </div>
    </div>

    <div class="status-bar">
        <div>🎙️ Ovoz: <span id="voiceStatus">✅ faol</span></div>
        <div>⭐ Sevimlilar: <span id="favCount">0</span></div>
        <div>🔽 Pult: ⬆️⬇️ navigatsiya</div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. KENGAYTIRILGAN SO'Z BAZASI (har bir harf uchun 100+ so'z)
    // --------------------------------------------------------------
    // Harflar ro'yxati (lotin asosida)
    const LETTERS = ["A","B","D","E","F","G","H","I","J","K","L","M","N","O","P","Q","R","S","T","U","V","X","Y","Z","O'","G'","Sh","Ch","Ng"];
    
    // Yordamchi funksiya: bo'g'inlarga ajratish (defis bilan)
    function syllabify(word) {
        // oddiy qoida: undosh + unli guruhlari, o'zbekcha so'zlar uchun mos
        return word.replace(/([^aeiouoʻg‘]+?[aeiouoʻg‘])/gi, '$1-').replace(/-$/, '');
    }
    
    // Asosiy so'zlar generatori: har bir harf uchun turli mavzulardan 100+ so'z
    function generateWordBank() {
        const bank = {};
        // Har bir harf uchun maxsus so'zlar to'plami (asosiy ildiz + qo'shimchalar)
        const specialRoots = {
            "A": ["olma","anor","ayiq","asos","axborot","avtomobil","adabiyot","akademiya","amaliyot","ariza","arvoh","asl","atrof","avlod","azob","ajdod","afsona","aql","a'zo","o'zbek"],
            "B": ["bola","bobo","baliq","bilim","bahor","bog'","bosh","burun","buxoro","bozor","bo'ron","burch","baxmal","baraka","bekor","bezak","baho","bog'bon","bemor","bo'g'in"],
            "D": ["dada","dala","davlat","daraxt","dunyo","dehqon","dori","davom","dastur","dil","do'st","duo","dargoh","daryo","davr","dahshat","dunyo","dovul","doston","davolash"],
            "E": ["ega","elak","eshik","ertak","ekin","elat","etik","elon","egasi","eski","ertaga","ezgu","erkin","ehtiyoj","ekspert","elektr","energiya","ertakchi","ezilgan","elchixona"],
            "F": ["fazo","fido","foiz","faol","ferma","faqir","fan","fonar","falsafa","foyda","fidokor","farzand","falokat","fakt","farq","futbol","fikr","foydali","farzandli","fotiha"],
            "G": ["gul","gavda","gilam","gado","guruh","gapi","guldon","gulxan","gulchi","garam","garmon","guvoh","guliston","gulparvar","gulxanchi","gilamdoz","gardish","go'zal","gulzor","g'ayrat"],
            "H": ["havo","hayo","hidla","hasad","hurmat","hali","hozir","hunarmand","harakat","hayajon","hayot","hukumat","haqiqat","hurmatli","hunar","hujjat","haykal","haqiqiy","halol","havaskor"],
            "I": ["ilon","ipak","irim","ikki","iliq","ishing","ishonch","ilova","ibora","ilm","ijod","ilmiy","ijobat","iqtisod","ixtiro","ichimlik","iymon","izoh","ixtiyor","iqtidor"],
            "J": ["juda","jo'ja","jazo","jiyda","jasur","jonim","javob","jo'nat","jahldor","joyla","jahon","juftlik","jahongir","joylashuv","jazava","javobgar","jasurlik","jinnilik","jamiyat","jinoyat"],
            "K": ["kabi","kuni","kecha","ko'rpa","kurak","kishi","kitob","karrak","komil","kiyim","kalom","kasbkor","kitobxon","komillik","kalamdon","kelajak","kalaka","kuzatish","kitobxona","kiyimkechak"],
            "L": ["lola","lagan","lug'at","laqab","loyqa","likash","limon","laziz","libos","lochin","laylak","lazzat","loyiha","limonzor","lolazor","liboslar","lazzatli","lato fat","laborator","layoqat"],
            "M": ["momo","maqol","mano","meva","mana","mosh","maktab","manba","mohir","mijoz","masjid","maqom","mashina","misol","mohirlik","moddiy","muallim","masala","mashinasoz","mas'ul"],
            "N": ["nomi","niyat","nota","navo","nega","naqd","nafas","ne'mat","navbat","norin","nishon","nodon","nafaqa","nizom","namuna","natija","nihoyat","nohaq","nizomnoma","nodonlik"],
            "O": ["ota","ona","oyoq","olov","oxir","og'iz","ovoz","olma","ochiq","oqil","odam","oqim","onasi","olimlar","ovoza","odamzod","osonlik","oqillik","onatili","ochiqlik"],
            "P": ["paxta","piyoz","padar","pulli","pari","pok","peshin","pakka","pufak","pochta","palov","poliz","pullik","parda","pishiq","paxtakor","parhezkor","polizchi","pochtaxona","pardozchi"],
            "Q": ["qari","qulfi","qozi","qonli","qad","qumli","qamish","qatiq","quyon","qalam","qozon","qaror","qattiq","quyosh","qolip","qozoncha","quyoshli","qarorgoh","qalamkash","qoliplamoq"],
            "R": ["rozi","rais","rosti","rang","rufti","rim","raqam","robot","rassom","rishta","rayhon","ruchka","rafiq","rivoj","risola","raqamli","rohatlan","rasmiy","rassomchi","risolachi"],
            "S": ["sahar","soya","suv","sir","sof","san","savat","sariq","sovuq","sanoq","soat","suli","suvor","salom","savoq","sarson","savatcha","sezgir","soatsoz","suvoriy"],
            "T": ["tola","tuya","til","tog'","tan","toj","tovoq","tilla","tog'a","tulki","talim","tomir","tuzuk","tarif","tikin","turar","talimot","tuzuklik","tomirlar","tarifnoma"],
            "U": ["uka","uya","unli","uzra","uy","ul","ukam","uzun","umid","uzum","ushoq","urug'","uloq","ulan","uyat","uquv","uzumzor","urug'chi","ulanma","uloqchi"],
            "V": ["vafo","voya","vaqt","vak","vay","vah","vatan","varaq","vakil","vodiy","vazni","vali","vijdon","video","vilka","varrak","vodiyli","viloyat","videolar","vasiyat"],
            "X": ["xato","xola","xafa","xos","xil","xor","xatlar","xumi","xarit","xalqim","xona","xurmo","xarid","xabar","xirmon","xaridor","xurmozor","xalqaro","xonadon","xabardor"],
            "Y": ["yangi","yarim","yo'q","yod","yoz","yot","yurak","yilgi","yovuz","yoqut","yozuv","yuz","yulg'un","yo'nal","yukla","yaxshi","yaqin","yozuvchi","yuklamoq","yarimta"],
            "Z": ["zina","zaki","zo'r","zeb","zir","zuv","zarba","zirak","zafar","zarar","zamin","zamon","zog'or","zona","zuluk","zanjir","zamonlar","zulmkor","zamindor","zararli"],
            "O'": ["o'zi","o'y","o'q","o't","o'n","o'ch","o'rik","o'rtoq","o'rdak","o'tish","o'yin","o'g'il","o'choq","o'rni","o'lim","o'zak","o'sim","o'rikzor","o'g'ilcha","o'zakli"],
            "G'": ["g'or","g'am","g'oz","g'isht","g'il","g'ash","g'o'za","g'ilof","g'olib","g'oya","girom","g'azab","g'alla","g'oyib","g'urur","g'amxo'r","g'ildir","g'oyona","g'ozalik","g'allakor"],
            "Sh": ["shu","shar","shoh","sher","shir","shan","shahar","shumi","shamo","shipa","shamol","shodlik","shodli","shirin","shukuh","sharaf","shuur","shukr","sharafli","shaharlar"],
            "Ch": ["cho'l","choy","chop","chaq","chek","chiz","chaqa","chuqur","chelak","chiroq","chayla","chopon","choynak","chuchva","chana","chaqir","cho'ntak","cho'loq","chaylachi","chuqurlik"],
            "Ng": ["tong","song","bong","ming","teng","keng","tanga","mangu","yangi","tongi","mingi","dengiz","shang'i","singil","jangchi","bangi","chengal","bengal","tangalar","mangulik"]
        };
        
        for (let letter of LETTERS) {
            let roots = specialRoots[letter] || ["xolera","xolerik","xoler","xol","xolisona","xolbek","xolmat","xolmirza","xolnazar","xolqobil","xoltoji","xolali","xolachi","xolavoy","xolayor","xolbek","xolboy","xoldor","xoljigit","xolmir","xolqori","xolsult","xoltoji","xolxo'ja","xolxo'ra","xolyor","xolzoda","xolzokir"];
            // har bir ildizdan bir nechta shakl yaratamiz (fe'l, ot, sifat) va bo'g'inlarga ajratamiz
            let words = [];
            // qo'shimchalar ro'yxati
            let suffixes = ["","chi","lik","dor","li","siz","kor","xona","goh","boz","lar","ning","da","ga","ni","dan","cha","ona","iy","viy","parvar","mand","kash","gir","don","zor","bon","gar"];
            for (let root of roots) {
                words.push(root);
                for (let sfx of suffixes.slice(0, 8)) {
                    if (sfx) words.push(root + sfx);
                }
            }
            // takrorlarni olib tashlash va har bir so'zni bo'g'inlarga ajratish (defis bilan)
            let unique = [...new Map(words.map(w => [w, syllabify(w)])).values()];
            // kamida 100 ta so'z bo'lishi kerak
            while (unique.length < 120) {
                unique.push(syllabify(unique[unique.length % roots.length] + "chi"));
            }
            // 6 bosqichga taqsimlash (1-bosqich eng ko'p, 6-bosqich eng murakkab)
            const stepWords = { step1: [], step2: [], step3: [], step4: [], step5: [], step6: [] };
            // oddiy murakkablik bo'yicha: qisqa so'zlar step1, uzunroqlari keyingi bosqichlar
            unique.sort((a,b) => a.length - b.length);
            let idx = 0;
            for (let i = 0; i < unique.length; i++) {
                let word = unique[i];
                let len = word.replace(/-/g,'').length;
                if (len <= 5) stepWords.step1.push(word);
                else if (len <= 7) stepWords.step2.push(word);
                else if (len <= 9) stepWords.step3.push(word);
                else if (len <= 11) stepWords.step4.push(word);
                else if (len <= 13) stepWords.step5.push(word);
                else stepWords.step6.push(word);
            }
            // har bir bosqichda kamida 6 ta so'z bo'lsin, yetishmasa boshqalardan olib to'ldirish
            for (let s=1; s<=6; s++) {
                let arr = stepWords[`step${s}`];
                if (arr.length < 6) {
                    let fillFrom = stepWords[`step${s-1>0?s-1:1}`];
                    while(arr.length < 6 && fillFrom.length) arr.push(fillFrom[arr.length % fillFrom.length]);
                }
            }
            bank[letter] = {
                step1: stepWords.step1.slice(0, 35),
                step2: stepWords.step2.slice(0, 30),
                step3: stepWords.step3.slice(0, 25),
                step4: stepWords.step4.slice(0, 20),
                step5: stepWords.step5.slice(0, 15),
                step6: stepWords.step6.slice(0, 15)
            };
            // Har bir harf uchun jami so'zlar sonini 100 dan oshirish
            let total = bank[letter].step1.length + bank[letter].step2.length + bank[letter].step3.length + bank[letter].step4.length + bank[letter].step5.length + bank[letter].step6.length;
            if (total < 100) {
                let extra = 100 - total;
                for (let i=0; i<extra; i++) bank[letter].step1.push(bank[letter].step1[i % bank[letter].step1.length]);
            }
        }
        return bank;
    }
    
    const DB = generateWordBank();
    
    // Barcha so'zlar massivi (auto mode uchun)
    let allWords = [];
    for (let step = 1; step <= 6; step++) {
        LETTERS.forEach(letter => {
            (DB[letter][`step${step}`] || []).forEach(word => {
                allWords.push({ word, letter, step, raw: word.replace(/-/g, '') });
            });
        });
    }
    const TOTAL_WORDS = allWords.length;
    
    // Favorites & LocalStorage
    let favorites = new Set();
    function loadFavs() { try { let f = localStorage.getItem("xoleric_favs"); if(f) favorites = new Set(JSON.parse(f)); } catch(e){} updateFavUI(); }
    function saveFavs() { localStorage.setItem("xoleric_favs", JSON.stringify([...favorites])); updateFavUI(); }
    function isFav(wordObj) { return favorites.has(wordObj.word); }
    function toggleFav(wordObj) { if(isFav(wordObj)) favorites.delete(wordObj.word); else favorites.add(wordObj.word); saveFavs(); }
    function updateFavUI() { document.getElementById("favCount").innerText = favorites.size; if(window.refreshListMode) refreshListMode(); if(window.updateAutoFavBtn) updateAutoFavBtn(); }
    
    // Voice
    let speechEnabled = true;
    function speakWord(text) {
        if(!speechEnabled) return;
        let clean = text.replace(/-/g, '');
        let utterance = new SpeechSynthesisUtterance(clean);
        utterance.lang = 'uz-UZ';
        utterance.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    
    // State
    let currentMode = "list";
    let currentStep = 1;
    let currentLetter = LETTERS[0];
    let showOnlyFavorites = false;
    let autoIndex = 0;
    let autoPlaying = true;
    let autoInterval = null;
    let autoSpeedSec = 30;
    let timerSeconds = 30;
    
    // DOM
    const listPanel = document.getElementById("listPanel");
    const autoPanel = document.getElementById("autoPanel");
    const listModeBtn = document.getElementById("listModeBtn");
    const autoModeBtn = document.getElementById("autoModeBtn");
    const showFavBtn = document.getElementById("showFavBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const toggleVoiceBtn = document.getElementById("toggleVoiceBtn");
    const voiceStatusSpan = document.getElementById("voiceStatus");
    
    function setMode(mode) {
        currentMode = mode;
        if(mode === "list") {
            listPanel.classList.remove("hidden");
            autoPanel.classList.add("hidden");
            listModeBtn.classList.add("active");
            autoModeBtn.classList.remove("active");
            stopAutoTimer();
            refreshListMode();
        } else {
            listPanel.classList.add("hidden");
            autoPanel.classList.remove("hidden");
            autoModeBtn.classList.add("active");
            listModeBtn.classList.remove("active");
            startAutoTimer();
            updateAutoDisplay();
        }
    }
    
    // List rendering
    function refreshListMode() {
        const stepTabsDiv = document.getElementById("stepTabsContainer");
        stepTabsDiv.innerHTML = "";
        for(let s=1; s<=6; s++) {
            let btn = document.createElement("button");
            btn.className = `step-tab ${currentStep===s ? 'active' : ''}`;
            btn.innerText = `${s}-bosqich`;
            btn.setAttribute("data-step", s);
            btn.onclick = () => { currentStep = s; refreshListMode(); };
            stepTabsDiv.appendChild(btn);
        }
        const letterTabsDiv = document.getElementById("letterTabsContainer");
        letterTabsDiv.innerHTML = "";
        LETTERS.forEach(letter => {
            let hasWords = (DB[letter][`step${currentStep}`]?.length || 0) > 0;
            if(!hasWords) return;
            let btn = document.createElement("button");
            btn.className = `letter-tab ${currentLetter===letter ? 'active' : ''}`;
            btn.innerText = letter;
            btn.onclick = () => { currentLetter = letter; refreshListMode(); };
            letterTabsDiv.appendChild(btn);
        });
        
        let wordsArray = DB[currentLetter][`step${currentStep}`] || [];
        let wordObjs = wordsArray.map(w => ({ word: w, letter: currentLetter, step: currentStep, raw: w.replace(/-/g,'') }));
        if(showOnlyFavorites) wordObjs = wordObjs.filter(w => favorites.has(w.word));
        
        const grid = document.getElementById("wordsGridContainer");
        grid.innerHTML = "";
        wordObjs.forEach(w => {
            const tile = document.createElement("div");
            tile.className = "word-tile";
            tile.setAttribute("tabindex", "0");
            const starActive = favorites.has(w.word);
            tile.innerHTML = `<span class="word-text">${w.word}</span><button class="fav-star ${starActive ? '' : 'inactive'}" data-word="${w.word}">${starActive ? '★' : '☆'}</button>`;
            const starBtn = tile.querySelector(".fav-star");
            starBtn.onclick = (e) => { e.stopPropagation(); toggleFav(w); refreshListMode(); };
            tile.onclick = (e) => { if(e.target !== starBtn) speakWord(w.word); };
            grid.appendChild(tile);
        });
        if(wordObjs.length === 0) grid.innerHTML = "<div style='padding:40px; text-align:center'>❗ Bu bo‘limda sevimli so‘z yo‘q</div>";
        // focus management: auto focus first tile
        if(grid.firstChild) grid.firstChild.focus();
    }
    
    // Auto mode
    function updateAutoDisplay() {
        let word = allWords[autoIndex];
        document.getElementById("autoBigWord").innerText = word.word;
        document.getElementById("autoMetaInfo").innerHTML = `${word.step}-bosqich · ${word.letter} harfi`;
        document.getElementById("autoProgress").innerHTML = `📍 ${autoIndex+1} / ${TOTAL_WORDS}`;
        if(speechEnabled) speakWord(word.word);
        updateAutoFavBtn();
    }
    function updateAutoFavBtn() {
        let btn = document.getElementById("favAutoBtn");
        let isFavNow = favorites.has(allWords[autoIndex].word);
        btn.innerHTML = isFavNow ? "⭐ Sevimlidan olib tashlash" : "⭐ Sevimlilarga qo‘shish";
    }
    function nextAuto() { autoIndex = (autoIndex+1) % TOTAL_WORDS; updateAutoDisplay(); resetAutoTimer(); }
    function prevAuto() { autoIndex = (autoIndex-1+TOTAL_WORDS)%TOTAL_WORDS; updateAutoDisplay(); resetAutoTimer(); }
    function resetAutoTimer() { if(autoPlaying) timerSeconds = autoSpeedSec; updateTimerDisplay(); }
    function updateTimerDisplay() { document.getElementById("timerDisplayAuto").innerHTML = `⏲️ ${timerSeconds} soniya`; }
    function startAutoTimer() {
        if(autoInterval) clearInterval(autoInterval);
        timerSeconds = autoSpeedSec;
        updateTimerDisplay();
        autoInterval = setInterval(() => {
            if(autoPlaying) {
                timerSeconds--;
                updateTimerDisplay();
                if(timerSeconds <= 0) {
                    nextAuto();
                    timerSeconds = autoSpeedSec;
                }
            }
        }, 1000);
    }
    function stopAutoTimer() { if(autoInterval) clearInterval(autoInterval); autoInterval=null; }
    function setAutoSpeed(sec) { autoSpeedSec = sec; if(autoPlaying) timerSeconds = sec; updateTimerDisplay(); }
    
    // Event listeners
    document.getElementById("prevAutoBtn").onclick = () => prevAuto();
    document.getElementById("nextAutoBtn").onclick = () => nextAuto();
    document.getElementById("playPauseAutoBtn").onclick = () => { autoPlaying = !autoPlaying; document.getElementById("playPauseAutoBtn").innerHTML = autoPlaying ? "⏸️ Pauza" : "▶️ Boshlash"; resetAutoTimer(); };
    document.getElementById("speakAutoBtn").onclick = () => speakWord(allWords[autoIndex].word);
    document.getElementById("favAutoBtn").onclick = () => { let w = allWords[autoIndex]; toggleFav(w); updateAutoFavBtn(); if(currentMode==="list") refreshListMode(); };
    document.querySelectorAll(".speed-option").forEach(btn => {
        btn.onclick = () => { document.querySelectorAll(".speed-option").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); setAutoSpeed(parseInt(btn.dataset.speed)); };
    });
    
    listModeBtn.onclick = () => setMode("list");
    autoModeBtn.onclick = () => { setMode("auto"); if(!autoInterval) startAutoTimer(); };
    showFavBtn.onclick = () => { showOnlyFavorites = !showOnlyFavorites; showFavBtn.style.background = showOnlyFavorites ? "#6366f1" : ""; refreshListMode(); };
    fullscreenBtn.onclick = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    toggleVoiceBtn.onclick = () => { speechEnabled = !speechEnabled; voiceStatusSpan.innerText = speechEnabled ? "✅ faol" : "🔇 o‘chirilgan"; };
    
    // Remote control: arrow keys navigation
    function getFocusableElements() {
        if (currentMode === "list") {
            const container = document.getElementById("wordsGridContainer");
            if (!container) return [];
            const tiles = Array.from(container.querySelectorAll(".word-tile"));
            const tabs = Array.from(document.querySelectorAll("#stepTabsContainer button, #letterTabsContainer button"));
            return [...tabs, ...tiles];
        } else {
            // auto mode: all interactive buttons
            return Array.from(document.querySelectorAll("#autoPanel button, .speed-option"));
        }
    }
    
    function scrollIntoViewIfNeeded(el) {
        if (el && el.scrollIntoView) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    
    let currentFocusIndex = 0;
    function updateFocus(delta) {
        let focusable = getFocusableElements();
        if (focusable.length === 0) return;
        if (currentFocusIndex < 0) currentFocusIndex = 0;
        if (currentFocusIndex >= focusable.length) currentFocusIndex = focusable.length - 1;
        let target = focusable[currentFocusIndex];
        if (target) {
            target.focus();
            scrollIntoViewIfNeeded(target);
        }
    }
    
    function handleKey(e) {
        const key = e.key;
        let focusable = getFocusableElements();
        if (focusable.length === 0) return;
        if (key === "ArrowDown") {
            e.preventDefault();
            currentFocusIndex = (currentFocusIndex + 1) % focusable.length;
            updateFocus();
        } else if (key === "ArrowUp") {
            e.preventDefault();
            currentFocusIndex = (currentFocusIndex - 1 + focusable.length) % focusable.length;
            updateFocus();
        } else if (key === "Enter" || key === " " || key === "Space") {
            e.preventDefault();
            let active = document.activeElement;
            if (active && active.click) active.click();
        } else if (key === "ArrowLeft" && currentMode === "auto") {
            e.preventDefault();
            prevAuto();
        } else if (key === "ArrowRight" && currentMode === "auto") {
            e.preventDefault();
            nextAuto();
        }
    }
    
    window.addEventListener("keydown", handleKey);
    // Reset focus index when mode changes
    function resetFocus() { currentFocusIndex = 0; setTimeout(() => updateFocus(0), 50); }
    const observer = new MutationObserver(() => resetFocus());
    observer.observe(document.getElementById("listPanel"), { childList: true, subtree: true });
    observer.observe(document.getElementById("autoPanel"), { childList: true, subtree: true });
    
    // Word of day
    function setWordOfDay() { let random = allWords[Math.floor(Math.random()*TOTAL_WORDS)]; document.getElementById("wordOfDay").innerHTML = `✨ KUN SO‘ZI: ${random.word}`; }
    setWordOfDay();
    
    // Initialize
    window.refreshListMode = refreshListMode;
    window.updateAutoFavBtn = updateAutoFavBtn;
    loadFavs();
    refreshListMode();
    updateAutoDisplay();
    setMode("list");
    startAutoTimer(); // preload but not visible
    stopAutoTimer(); // stop because list mode active
    setMode("list");
</script>
</body>
</html>
