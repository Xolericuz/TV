<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOLERIC OS | Smart TV</title>
    <meta name="theme-color" content="#020204">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg: radial-gradient(circle at 30% 20%, #0a0a18, #020204 90%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #fbbf24;
            --accent-glow: 0 0 40px rgba(251, 191, 36, 0.6);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --focus-scale: 1.12;
            --transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            height: 100dvh;
            width: 100dvw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        button {
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
        }

        :focus-visible {
            outline: none;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(2, 2, 4, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            z-index: 20;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-buttons {
            display: flex;
            gap: 1rem;
        }
        .icon-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }
        .icon-btn:focus {
            transform: scale(1.05);
            box-shadow: var(--accent-glow);
            border-color: var(--accent);
        }
        .status-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1.2rem;
            padding: 0.4rem 2rem;
            background: rgba(0, 0, 0, 0.4);
            font-size: 0.7rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .main-screen {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
        .screen {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            padding: 1.5rem 2rem 2rem;
            scrollbar-width: thin;
        }
        .screen::-webkit-scrollbar {
            width: 6px;
        }
        .hidden {
            display: none !important;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 55vh;
            border-radius: 2rem;
            overflow: hidden;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(251, 191, 36, 0.2), transparent 70%);
            filter: blur(50px);
            animation: floatBg 8s infinite alternate;
        }
        @keyframes floatBg {
            0% { transform: translateY(-10px) scale(1); opacity: 0.6; }
            100% { transform: translateY(20px) scale(1.1); opacity: 1; }
        }
        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
        }
        .hero-word {
            font-size: clamp(2.5rem, 12vw, 5rem);
            font-weight: 800;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }
        .hero-meta {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }
        .hero-actions {
            display: flex;
            gap: 1.2rem;
        }
        .hero-btn {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 0.7rem 1.8rem;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
        }
        .hero-btn:focus {
            transform: scale(1.08);
            box-shadow: var(--accent-glow);
            border-color: var(--accent);
        }

        /* Rows */
        .row {
            margin-bottom: 2.5rem;
        }
        .row-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dim);
        }
        .row-track {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            padding-bottom: 0.8rem;
            scroll-behavior: smooth;
        }
        .row-track::-webkit-scrollbar {
            height: 5px;
        }
        .card {
            min-width: 200px;
            height: 130px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            transition: var(--transition);
            will-change: transform;
            cursor: pointer;
            position: relative;
        }
        .card:focus {
            transform: scale(var(--focus-scale)) translateY(-8px);
            box-shadow: var(--accent-glow);
            border-color: var(--accent);
            outline: none;
        }
        .card-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 1rem;
            text-align: center;
        }
        .card-word {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .card-sub {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        .card-star {
            position: absolute;
            top: 0.5rem;
            right: 0.8rem;
            font-size: 1.3rem;
            background: none;
            border: none;
            color: var(--accent);
            opacity: 0.7;
        }
        .card-star.active {
            opacity: 1;
            text-shadow: 0 0 8px gold;
        }

        /* Detail overlay */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 4, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .detail-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .close-btn {
            background: var(--glass);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 1rem;
        }
        .step-tabs-detail {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .step-tab-detail {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
        }
        .step-tab-detail.active {
            background: var(--accent);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }
        .detail-card {
            background: var(--glass);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
        }
        .detail-card:focus {
            transform: scale(1.05);
            box-shadow: var(--accent-glow);
            border: 1px solid var(--accent);
        }

        /* Cinematic mode */
        .cinematic-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a1a, #000);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease;
        }
        .cinematic-layer {
            position: relative;
        }
        .cinematic-word {
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeZoom 0.6s ease, wordPulse 2s infinite alternate;
        }
        .word-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 800;
            color: transparent;
            text-shadow: 0 0 20px rgba(251,191,36,0.8);
            z-index: -1;
            animation: shadowPulse 2s infinite alternate;
        }
        @keyframes wordPulse {
            0% { text-shadow: 0 0 0px gold; }
            100% { text-shadow: 0 0 40px gold, 0 0 80px orange; }
        }
        @keyframes shadowPulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }
        .cinematic-meta {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-top: 1rem;
        }
        .cinematic-controls {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
        }
        @keyframes fadeZoom {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

    // Favorites
    let favorites = new Set();
    function loadFavs() {
        try {
            const saved = localStorage.getItem("xoleric_favs");
            if (saved) favorites = new Set(JSON.parse(saved));
        } catch(e) {}
        updateFavUI();
    }
    function saveFavs() {
        localStorage.setItem("xoleric_favs", JSON.stringify([...favorites]));
        updateFavUI();
    }
    function toggleFav(wordObj) {
        if (favorites.has(wordObj.word)) favorites.delete(wordObj.word);
        else favorites.add(wordObj.word);
        saveFavs();
    }
    function isFav(word) {
        return favorites.has(word);
    }
    function updateFavUI() {
        document.getElementById("favCount").innerText = favorites.size;
    }

    // Speech
    let speechEnabled = true;
    function speakWord(text) {
        if (!speechEnabled) return;
        const clean = text.replace(/-/g, '');
        const utterance = new SpeechSynthesisUtterance(clean);
        utterance.lang = 'uz-UZ';
        utterance.rate = 0.85;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    // Ambient sound (simple wind)
    let audioCtx = null;
    let windActive = true;
    let windGain = null;
    let windSource = null;
    let windLoop = null;
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        windGain = audioCtx.createGain();
        windGain.gain.value = 0.2;
        windGain.connect(audioCtx.destination);
    }
    function startWind() {
        if (!windActive || !audioCtx) return;
        if (windSource) stopWind();
        const bufferSize = 2 * audioCtx.sampleRate;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i=0; i<bufferSize; i++) {
            let noise = (Math.random()*2-1)*0.6;
            let envelope = 0.5 + 0.3 * Math.sin(i * 0.0005);
            data[i] = noise * envelope;
        }
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;
        noiseNode.connect(windGain);
        noiseNode.start();
        windSource = noiseNode;
        function modulate() {
            if (!windActive || !windGain) return;
            windGain.gain.value = 0.18 + Math.sin(Date.now() * 0.0015) * 0.06;
            windLoop = requestAnimationFrame(modulate);
        }
        modulate();
    }
    function stopWind() {
        if (windSource) {
            try { windSource.stop(); } catch(e) {}
            windSource = null;
        }
        if (windLoop) cancelAnimationFrame(windLoop);
        if (windGain) windGain.gain.value = 0;
    }
    function toggleSound() {
        windActive = !windActive;
        const btn = document.getElementById("soundToggleBtn");
        const status = document.getElementById("soundStatus");
        if (windActive) {
            if (!audioCtx) initAudio();
            startWind();
            if (audioCtx.state === "suspended") audioCtx.resume();
            btn.innerHTML = "🌬️ OVOZ: YOQIQ";
            status.innerText = "🌬️ shamol";
        } else {
            stopWind();
            btn.innerHTML = "🔇 OVOZ: O'CHIQ";
            status.innerText = "🔇 o'chirilgan";
        }
    }
    function resumeAudio() {
        if (audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
            if (windActive) startWind();
        }
    }
    document.addEventListener("click", resumeAudio);
    document.addEventListener("keydown", resumeAudio);

            <div class="hero">
                <div class="hero-bg"></div>
                <div class="hero-content">
                    <div class="hero-word">${randomWord.word}</div>
                    <div class="hero-meta">✨ Bugungi so‘z</div>
                    <div class="hero-actions">
                        <button class="hero-btn" data-word="${randomWord.word}" id="heroPlayBtn">▶ Boshlash</button>
                        <button class="hero-btn" id="heroSaveBtn">⭐ Saqlash</button>
                    </div>
                </div>
            </div>
        `;

        const continueWords = allWords.filter(w => w.step <= 2).sort(() => 0.5 - Math.random()).slice(0, 8);
        const letterItems = LETTERS.slice(0, 8).map(l => ({ word: l, isLetter: true }));
        const categoryItems = Object.keys(CATEGORIES).map(c => ({ word: c, isCategory: true }));
        const favWords = allWords.filter(w => isFav(w.word)).slice(0, 8);
        const stepItems = [1,2,3,4,5,6].map(s => ({ word: `${s}-bosqich`, isStep: true, step: s }));

        const rows = [
            { title: "🔥 Davom ettirish", items: continueWords },
            { title: "🔤 Harflar", items: letterItems },
            { title: "📚 Kategoriyalar", items: categoryItems },
            { title: "⭐ Sevimlilar", items: favWords },
            { title: "📊 Bosqichlar", items: stepItems }
        ];

        let rowsHtml = "";
        for (let row of rows) {
            rowsHtml += `<div class="row"><div class="row-title">${row.title}</div><div class="row-track">`;
            for (let item of row.items) {
                const fav = !item.isLetter && !item.isCategory && !item.isStep && isFav(item.word);
                rowsHtml += `
                    <div class="card" data-type="${item.isLetter ? 'letter' : item.isCategory ? 'category' : item.isStep ? 'step' : 'word'}" data-word="${item.word || ''}" data-letter="${item.letter || ''}" data-category="${item.category || ''}" data-step="${item.step || ''}" tabindex="0">
                        <div class="card-inner">
                            <div class="card-word">${item.word || (item.isLetter ? item.letter : (item.isCategory ? item.word : (item.isStep ? `${item.step}-bosqich` : '')))}</div>
                            ${item.letter && !item.isLetter ? `<div class="card-sub">${item.letter} harfi</div>` : ''}
                            ${item.category && !item.isCategory ? `<div class="card-sub">${item.category}</div>` : ''}
                        </div>
                        ${!item.isLetter && !item.isCategory && !item.isStep ? `<button class="card-star ${fav ? 'active' : ''}" data-word="${item.word}">${fav ? '★' : '☆'}</button>` : ''}
                    </div>
                `;
            }
            rowsHtml += `</div></div>`;
        }
        mainContainer.innerHTML = `<div class="screen" id="homeScreen">${heroHtml}${rowsHtml}</div>`;
        attachHomeEvents(randomWord);
        attachHomeKeyboard();
    }

    function attachHomeEvents(randomWord) {
        const playBtn = document.getElementById("heroPlayBtn");
        const saveBtn = document.getElementById("heroSaveBtn");
        if (playBtn) playBtn.onclick = () => startCinematic(randomWord.word);
        if (saveBtn) saveBtn.onclick = () => { toggleFav(randomWord); renderHomeScreen(); };

        document.querySelectorAll(".card").forEach(card => {
            card.addEventListener("click", (e) => {
                e.stopPropagation();
                const type = card.dataset.type;
                if (type === "letter") openDetail("letter", card.dataset.letter);
                else if (type === "category") openDetail("category", card.dataset.word);
                else if (type === "step") openDetail("step", null, parseInt(card.dataset.step));
                else if (type === "word") speakWord(card.dataset.word);
            });
            const star = card.querySelector(".card-star");
            if (star) {
                star.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const wordObj = allWords.find(w => w.word === star.dataset.word);
                    if (wordObj) { toggleFav(wordObj); renderHomeScreen(); }
                });
            }
        });
    }

    function attachHomeKeyboard() {
        const focusEngine = {
            cols: 8,
            elements: [],
            index: 0,
            register(elements) { this.elements = elements; },
            move(dir) {
                if (this.elements.length === 0) return;
                let newIdx = this.index;
                if (dir === "right") newIdx++;
                else if (dir === "left") newIdx--;
                else if (dir === "down") newIdx += this.cols;
                else if (dir === "up") newIdx -= this.cols;
                newIdx = (newIdx + this.elements.length) % this.elements.length;
                this.index = newIdx;
                this.elements[this.index].focus();
                this.elements[this.index].scrollIntoView({ block: "nearest", behavior: "smooth" });
            },
            focusFirst() { if (this.elements.length) { this.index = 0; this.elements[0].focus(); } }
        };
        const cards = Array.from(document.querySelectorAll(".card"));
        focusEngine.register(cards);
        focusEngine.focusFirst();
        const keyHandler = (e) => {
            if (!document.getElementById("homeScreen")) return;
            if (e.key === "ArrowRight") { e.preventDefault(); focusEngine.move("right"); }
            else if (e.key === "ArrowLeft") { e.preventDefault(); focusEngine.move("left"); }
            else if (e.key === "ArrowDown") { e.preventDefault(); focusEngine.move("down"); }
            else if (e.key === "ArrowUp") { e.preventDefault(); focusEngine.move("up"); }
            else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (document.activeElement && document.activeElement.click) document.activeElement.click(); }
        };
        window.removeHomeKeys = () => window.removeEventListener("keydown", keyHandler);
        window.addEventListener("keydown", keyHandler);
    }

    function openDetail(type, value, stepVal = null) {
        let items = [];
        let title = "";
        if (type === "letter") {
            for (let s=1; s<=6; s++) {
                (DB[value][`step${s}`] || []).forEach(w => items.push({ word: w, letter: value, step: s, type: "letter" }));
            }
            title = `${value} harfi`;
        } else if (type === "category") {
            for (let s=1; s<=6; s++) {
                (CATEGORIES[value][`step${s}`] || []).forEach(w => items.push({ word: w, category: value, step: s, type: "category" }));
            }
            title = value;
        } else if (type === "step") {
            items = allWords.filter(w => w.step === stepVal);
            title = `${stepVal}-bosqich`;
        }
        renderDetailOverlay(title, items, 1, type);
    }

    function renderDetailOverlay(title, items, currentStep, type) {
        let overlay = document.getElementById("detailOverlay");
        if (!overlay) {
            overlay = document.createElement("div");
            overlay.id = "detailOverlay";
            overlay.className = "detail-overlay";
            document.body.appendChild(overlay);
        }
        const filtered = items.filter(i => i.step === currentStep);
        const stepsHtml = `
            <div class="step-tabs-detail">
                ${[1,2,3,4,5,6].map(s => `<button class="step-tab-detail ${s === currentStep ? 'active' : ''}" data-step="${s}">${s}-bosqich</button>`).join('')}
            </div>
        `;
        const gridHtml = filtered.map(item => {
            const fav = isFav(item.word);
            return `<div class="detail-card" data-word="${item.word}" data-step="${item.step}" tabindex="0">
                        <div>${item.word}</div>
                        <div style="font-size:0.7rem;color:var(--text-dim);">${item.category || item.letter || ''} · ${item.step}</div>
                        <button class="star-btn-detail" style="background:none;border:none;color:gold;margin-top:6px;">${fav ? '★' : '☆'}</button>
                    </div>`;
        }).join('');
        overlay.innerHTML = `
            <div class="detail-header">
                <div class="detail-title">${title}</div>
                <button class="close-btn" id="closeDetail">✕ Yopish</button>
            </div>
            ${stepsHtml}
            <div class="detail-grid" id="detailGrid">${gridHtml}</div>
        `;
        document.getElementById("closeDetail").onclick = () => { overlay.remove(); renderHomeScreen(); };
        const stepBtns = overlay.querySelectorAll(".step-tab-detail");
        stepBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                const newStep = parseInt(btn.dataset.step);
                renderDetailOverlay(title, items, newStep, type);
            });
        });
        const cards = overlay.querySelectorAll(".detail-card");
        cards.forEach(card => {
            card.addEventListener("click", () => speakWord(card.dataset.word));
            const star = card.querySelector(".star-btn-detail");
            star.addEventListener("click", (e) => {
                e.stopPropagation();
                const wordObj = allWords.find(w => w.word === card.dataset.word);
                if (wordObj) { toggleFav(wordObj); renderDetailOverlay(title, items, currentStep, type); }
            });
        });
        // focus engine for detail
        const focusEngine = { cols: 4, elements: Array.from(cards), index: 0, move(dir) { /* same as before */ }, focusFirst() { if (this.elements.length) this.elements[0].focus(); } };
        focusEngine.focusFirst();
        const keyHandler = (e) => {
            if (!document.getElementById("detailOverlay")) return;
            if (e.key === "ArrowRight") { e.preventDefault(); focusEngine.move("right"); }
            else if (e.key === "ArrowLeft") { e.preventDefault(); focusEngine.move("left"); }
            else if (e.key === "ArrowDown") { e.preventDefault(); focusEngine.move("down"); }
            else if (e.key === "ArrowUp") { e.preventDefault(); focusEngine.move("up"); }
            else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (document.activeElement && document.activeElement.click) document.activeElement.click(); }
        };
        window.addEventListener("keydown", keyHandler);
        overlay._keyHandler = keyHandler;
    }

    // Cinematic mode
    let cinemaInterval = null;
    let cinemaIndex = 0;
    let cinemaPlaying = true;
    let cinemaSpeed = 30;

    function startCinematic(startWord) {
        const idx = allWords.findIndex(w => w.word === startWord);
        cinemaIndex = idx >= 0 ? idx : 0;
        showCinematicScreen();
    }

    function showCinematicScreen() {
        if (cinemaInterval) clearInterval(cinemaInterval);
        const screen = document.createElement("div");
        screen.className = "cinematic-mode";
        document.body.appendChild(screen);
        function update() {
            const word = allWords[cinemaIndex];
            screen.innerHTML = `
                <div class="cinematic-layer">
                    <div class="cinematic-word">${word.word}</div>
                    <div class="word-shadow">${word.word}</div>
                </div>
                <div class="cinematic-meta">${word.step}-bosqich · ${word.category || word.letter || ''}</div>
                <div class="cinematic-controls">
                    <button class="hero-btn" id="cinemaPrev">◀ Oldingi</button>
                    <button class="hero-btn" id="cinemaPlayPause">${cinemaPlaying ? "⏸️ Pauza" : "▶️ Boshlash"}</button>
                    <button class="hero-btn" id="cinemaNext">Keyingi ▶</button>
                    <button class="hero-btn" id="cinemaExit">✕ Chiqish</button>
                </div>
                <div style="margin-top:1rem;color:var(--accent);">⏲️ ${Math.floor(cinemaSpeed)} soniya</div>
            `;
            speakWord(word.word);
            document.getElementById("cinemaPrev").onclick = () => {
                cinemaIndex = (cinemaIndex - 1 + allWords.length) % allWords.length;
                update();
                resetTimer();
            };
            document.getElementById("cinemaNext").onclick = () => {
                cinemaIndex = (cinemaIndex + 1) % allWords.length;
                update();
                resetTimer();
            };
            document.getElementById("cinemaPlayPause").onclick = () => {
                cinemaPlaying = !cinemaPlaying;
                document.getElementById("cinemaPlayPause").innerHTML = cinemaPlaying ? "⏸️ Pauza" : "▶️ Boshlash";
                resetTimer();
            };
            document.getElementById("cinemaExit").onclick = () => {
                if (cinemaInterval) clearInterval(cinemaInterval);
                screen.remove();
                renderHomeScreen();
            };
            resetTimer();
        }
        function resetTimer() {
            if (cinemaInterval) clearInterval(cinemaInterval);
            if (cinemaPlaying) {
                let timeLeft = cinemaSpeed;
                const interval = setInterval(() => {
                    if (!cinemaPlaying) return;
                    timeLeft--;
                    const timerDiv = screen.querySelector("div:last-child");
                    if (timerDiv) timerDiv.innerText = `⏲️ ${timeLeft} soniya`;
                    if (timeLeft <= 0) {
                        cinemaIndex = (cinemaIndex + 1) % allWords.length;
                        update();
                        timeLeft = cinemaSpeed;
                    }
                }, 1000);
                cinemaInterval = interval;
            }
        }
        update();
    }

    // UI buttons
    document.getElementById("fullscreenBtn").onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    document.getElementById("soundToggleBtn").onclick = toggleSound;
    document.getElementById("voiceToggleBtn").onclick = () => {
        speechEnabled = !speechEnabled;
        document.getElementById("voiceToggleBtn").innerHTML = speechEnabled ? "🎙️ OVOZ: FAOL" : "🔇 OVOZ: O'CHIQ";
    };

    // Start
    loadFavs();
    initAudio();
    setTimeout(() => startWind(), 500);
    renderHomeScreen();
</script>
</body>
</html>
